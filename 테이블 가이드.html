<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>Q bot 테이블 가이드</title>

    <script src="https://cdn.ckeditor.com/ckeditor5/40.0.0/classic/ckeditor.js"></script>

    <style>
        body {
            padding: 20px;
            background: #f4f6f8;
            font-family: "Noto Sans KR", sans-serif;
        }

        .section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .section h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            font-family: monospace;
            font-size: 13px;
        }

        button {
            padding: 8px 16px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
        }

        button.primary {
            background: #111;
            color: #fff;
            border-color: #111;
        }

        .btns {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        iframe {
            width: 100%;
            height: 420px;
            border: 1px solid #ddd;
        }

        .ck-editor__editable {
            min-height: 200px;
        }

        .red {
            color: red;
        }
    </style>
</head>

<body>
    <h1>Q bot 테이블 가이드</h1>
    <div class="section">
        <h2>① 콘텐츠 작성 (에디터)</h2>
        <p>: 엑셀을 복사 + 붙여넣기 해주세요!</p>
        <textarea id="editor"></textarea>
    </div>

    <div class="section">
        <h2>② HTML 코드변환 (직접 수정 가능)</h2>
        <p>: 표 헤드(head)는 <b class="red">&lt;td&gt; ➡️ &lt;th&gt;</b>로 바꿔주세요!</p>
        <textarea id="output"></textarea>
        <div class="btns">
            <button class="primary" id="copyBtn">HTML 복사</button>
            <button id="previewBtn">미리보기 새로고침</button>
        </div>
    </div>

    <div class="section">
        <h2>③ 실서비스 미리보기</h2>
        <iframe id="preview"></iframe>
    </div>

    <script>
        let editor;

        // 🔥 CMS 직접 수정 중 여부
        let isEditingCms = false;

        const outputEl = document.getElementById('output');

        /* =====================
           CKEDITOR INIT
        ===================== */
        ClassicEditor.create(document.querySelector('#editor'), {
            toolbar: [
                'heading',
                '|',
                'bold', 'italic', 'link',
                'bulletedList', 'numberedList',
                '|',
                'undo', 'redo'
            ]
        }).then(ed => {
            editor = ed;
            renderFromEditor();
            editor.model.document.on('change:data', renderFromEditor);
        });

        /* =====================
           NORMALIZE (사내 표준 핵심)
        ===================== */
        function normalize(html) {
            return html
                .replace(/<h2>/g, '<h2 class="tit">')
                .replace(/<h3>/g, '<h3 class="sub-tit">')
                .replace(/<ul>/g, '<ul class="bul-list">')

                // ❌ inline style 제거
                .replace(/ style="[^"]*"/g, '')

                // ❌ 외부 class 제거
                .replace(/ class="[^"]*"/g, '')

                // 🔥 테이블 왼쪽 열 th 처리
                .replace(
                    /<tr>\s*<td>(.*?)<\/td>\s*<td>/g,
                    '<tr><th scope="row">$1</th><td>'
                );
        }

        /* =====================
           에디터 → CMS
        ===================== */
        function renderFromEditor() {
            if (!editor) return;

            // 🔥 CMS 직접 수정 중이면 덮어쓰기 금지
            if (isEditingCms) return;

            const content = normalize(editor.getData());

            const cmsHtml = `
<div class="content-service-view">
${content}
</div>
`.trim();

            outputEl.value = cmsHtml;
            renderFromCms();
        }

        /* =====================
           CMS → PREVIEW
        ===================== */
        function renderFromCms() {
            const cmsHtml = outputEl.value;

            const previewHtml = `
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<style>
.content-service-view {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  font-family: "Noto Sans KR", sans-serif;
}

.content-service-view .tit {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 16px;
}

.content-service-view .sub-tit {
  font-size: 18px;
  font-weight: 600;
  margin: 20px 0 10px;
}

.content-service-view p {
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 12px;
}

.content-service-view table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  border-top: 2px solid #222;
}

.content-service-view th,
.content-service-view td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid #ddd;
}

.content-service-view th {
  background: #f5f5f5;
  font-weight: 600;
  text-align: left;
  width: 200px;
}
</style>
</head>
<body>
${cmsHtml}
</body>
</html>
`;

            const iframe = document.getElementById('preview');
            iframe.removeAttribute('src');
            iframe.srcdoc = previewHtml;
        }

        /* =====================
           EVENTS
        ===================== */

        // 🔥 CMS 수정 시작 / 종료 감지
        outputEl.addEventListener('focus', () => {
            isEditingCms = true;
        });

        outputEl.addEventListener('blur', () => {
            isEditingCms = false;
        });

        outputEl.addEventListener('input', renderFromCms);
        document.getElementById('previewBtn').addEventListener('click', renderFromCms);

        document.getElementById('copyBtn').addEventListener('click', () => {
            outputEl.select();
            document.execCommand('copy');
            alert('HTML이 복사되었습니다.');
        });
    </script>

</body>

</html>
